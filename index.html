<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>jbpark.design</title>
  <link rel="stylesheet" href="style.css?v=13">
</head>
<body>

  <div class="sidebar">

    <header>
      <a href="/" class="logo" aria-label="Jeffrey Park">
        <span class="j-group">
          <span class="initial">J</span>
          <span class="firstname-clip"><span class="firstname-text">effrey</span></span>
        </span>
        <span class="name-space"></span>
        <span class="p-group">
          <span class="initial">P</span>
          <span class="lastname-clip"><span class="lastname-text">ark</span></span>
        </span>
      </a>

      <nav>
        <a href="#" class="nav-link">About</a>
        <a href="https://www.linkedin.com/in/jeffreybpark/" target="_blank" rel="noopener" class="nav-link">
          LinkedIn
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <path d="M4 4H14M14 4V14M14 4L4 14" stroke="currentColor" stroke-width="1.67" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
      </nav>
    </header>

    <div class="content-section">
      <div class="project-list">

        <div class="divider"></div>

        <a href="#" class="list-row">
          <div class="project-item">
            <span class="word">Rivian</span>
            <span class="sep sep--icon-only">
              <span class="icon">
                <div class="lottie-canvas" data-src="assets/lotties/rivian-assistant/animation.json"></div>
              </span>
            </span>
            <span class="word">Assistant</span>
          </div>
        </a>

        <div class="divider"></div>

        <a href="#" class="list-row">
          <div class="project-item">
            <span class="word">Joyful</span>
            <span class="sep sep--icon-only">
              <span class="icon">
                <div class="lottie-canvas" data-src="assets/lotties/joyful-utilities/animation.json"></div>
              </span>
            </span>
            <span class="word">Utilities</span>
          </div>
        </a>

        <div class="divider"></div>

        <a href="#" class="list-row">
          <div class="project-item">
            <span class="word">Security</span>
            <span class="sep sep--swap">
              <span class="amp">&amp;</span>
              <span class="icon">
                <div class="lottie-canvas" data-src="assets/lotties/security/animation.json"></div>
              </span>
            </span>
            <span class="word">Access</span>
          </div>
        </a>

        <div class="divider"></div>

        <a href="#" class="list-row">
          <div class="project-item">
            <span class="word">Energy</span>
            <span class="sep sep--swap">
              <span class="amp">&amp;</span>
              <span class="icon">
                <div class="lottie-canvas" data-src="assets/lotties/energy/animation.json"></div>
              </span>
            </span>
            <span class="word">Charging</span>
          </div>
        </a>

        <div class="divider"></div>

        <a href="#" class="list-row">
          <div class="project-item">
            <span class="word">Archive</span>
            <span class="sep sep--icon-only">
              <span class="icon">
                <div class="lottie-canvas" data-src="assets/lotties/archive/animation.json" data-loop="false"></div>
              </span>
            </span>
          </div>
        </a>

        <div class="divider"></div>

      </div>

      <footer>
        <span class="copyright"><span class="copyright-glyph">✌︎</span> ©2025</span>
        <button class="nav-link email-btn" onclick="copyEmail()" aria-label="Copy email address">
          <span class="email-label-wrap"><span class="email-label">jbpark.design@gmail.com</span></span>
          <span class="email-icons">
            <svg class="icon-copy" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
              <rect x="1" y="1" width="10.8" height="10.8" rx="1.6" stroke="currentColor" stroke-width="1.67"/>
              <path d="M5.60059 14.3006V14.8006C5.60059 15.6842 6.31693 16.4006 7.20059 16.4006H14.8006C15.6842 16.4006 16.4006 15.6842 16.4006 14.8006V7.20059C16.4006 6.31693 15.6842 5.60059 14.8006 5.60059H14.3006" stroke="currentColor" stroke-width="1.67"/>
            </svg>
            <svg class="icon-thumb" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
              <path d="M6.5 8.5L9 3.5C9.8 3.5 10.5 4.2 10.5 5V7.5H14C14.8 7.5 15.3 8.3 15.1 9.1L13.9 13.6C13.7 14.2 13.2 14.5 12.6 14.5H6.5V8.5Z" stroke="currentColor" stroke-width="1.67" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M6.5 8.5H4C3.4 8.5 3 8.9 3 9.5V13.5C3 14.1 3.4 14.5 4 14.5H6.5V8.5Z" stroke="currentColor" stroke-width="1.67" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </button>
      </footer>
    </div>

  </div>

  <div class="project-panel">
    <button class="close-btn" onclick="exitProject()" aria-label="Close project">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
        <path d="M1 1L13 13M13 1L1 13" stroke="currentColor" stroke-width="1.67" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <script src="assets/js/lottie.min.js"></script>
  <script>
    document.querySelectorAll('.lottie-canvas').forEach(container => {
      const shouldLoop = container.dataset.loop !== 'false';
      const anim = lottie.loadAnimation({
        container,
        renderer: 'svg',
        autoplay: false,
        loop: shouldLoop,
        path: container.dataset.src,
      });

      const row = container.closest('.list-row');

      row.addEventListener('mouseenter', () => {
        anim.goToAndPlay(anim.firstFrame, true);
      });

      row.addEventListener('mouseleave', () => {
        anim.stop();
      });
    });

    document.querySelectorAll('.list-row').forEach(row => {
      row.addEventListener('click', (e) => {
        e.preventDefault();
        document.querySelectorAll('.list-row').forEach(r => r.classList.remove('active'));
        row.classList.add('active');
        enterProject();
      });
    });

    const emailBtn = document.querySelector('.email-btn');
    const emailLabel = emailBtn.querySelector('.email-label');
    const HALF = 100; // each half (exit + enter) = 100ms

    function getDefaultLabel() {
      return document.body.classList.contains('sidebar-mode') ? 'Email' : 'jbpark.design@gmail.com';
    }

    function swapLabel(text) {
      // Measure current width
      const fromW = emailBtn.getBoundingClientRect().width;
      emailBtn.style.width = fromW + 'px';

      // Peek at target width without showing it
      const originalText = emailLabel.textContent;
      emailLabel.style.visibility = 'hidden';
      emailLabel.textContent = text;
      emailBtn.style.width = 'auto';
      const toW = emailBtn.getBoundingClientRect().width;
      emailBtn.style.width = fromW + 'px';
      emailLabel.textContent = originalText;
      emailLabel.style.visibility = '';

      // Kick off width transition and label slide together
      void emailBtn.offsetWidth;
      emailBtn.style.width = toW + 'px';

      emailLabel.classList.add('label-exit');
      setTimeout(() => {
        emailLabel.textContent = text;
        emailLabel.classList.remove('label-exit');
        void emailLabel.offsetWidth; // force reflow so enter animation restarts
        emailLabel.classList.add('label-enter');
        setTimeout(() => {
          emailLabel.classList.remove('label-enter');
          setTimeout(() => { emailBtn.style.width = ''; }, 200);
        }, HALF);
      }, HALF);
    }

    function enterProject() {
      document.body.classList.add('sidebar-mode');
      if (!emailBtn.classList.contains('copied')) swapLabel('Email');
    }

    function exitProject() {
      document.body.classList.remove('sidebar-mode');
      if (!emailBtn.classList.contains('copied')) swapLabel('jbpark.design@gmail.com');
    }

    function copyEmail() {
      const email = 'jbpark.design@gmail.com';
      const onSuccess = () => {
        emailBtn.classList.add('copied');
        swapLabel('Copied to clipboard');
        setTimeout(() => {
          emailBtn.classList.add('reverting');
          swapLabel(getDefaultLabel());
          setTimeout(() => {
            emailBtn.classList.remove('copied', 'reverting');
          }, 200);
        }, 2200);
      };
      if (navigator.clipboard) {
        navigator.clipboard.writeText(email).then(onSuccess);
      } else {
        const el = document.createElement('textarea');
        el.value = email;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        onSuccess();
      }
    }
  </script>

</body>
</html>
